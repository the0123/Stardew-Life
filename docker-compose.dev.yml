services:
  postgres:
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development

  frontend:
    profiles: ["donotstart"]
